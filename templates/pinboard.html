{% extends "base.html" %} {% block content %}
<div class="container py-5">
  <div class="mb-4">
    <h2 class="fw-bold">Events</h2>
    <p class="text-muted">Discover and join upcoming alumni events.</p>
  </div>

  {% if current_user.role == "admin" %}
  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <h5 class="mb-3">Create Event</h5>

      <input
        id="eventTitle"
        class="form-control mb-3"
        placeholder="Event Title"
      />

      <textarea
        id="eventDescription"
        class="form-control mb-3"
        placeholder="Event Description"
      ></textarea>

      <input
        id="eventLocation"
        class="form-control mb-3"
        placeholder="Location"
      />

      <input
        id="eventDate"
        type="datetime-local"
        class="form-control mb-3"
        step="60"
      />

      <button id="createEventBtn" type="button" class="btn btn-primary">
        Create Event
      </button>
    </div>
  </div>
  {% endif %}

  <div id="eventsContainer"></div>
</div>

<script>
  const USER_ROLE = "{{ current_user.role }}";

  async function createEvent() {
    try {
      const title = document.getElementById("eventTitle")?.value.trim() || "";
      const description =
        document.getElementById("eventDescription")?.value.trim() || "";
      const location =
        document.getElementById("eventLocation")?.value.trim() || "";
      const date = document.getElementById("eventDate")?.value || "";

      if (!title || !description || !location || !date) {
        alert("Please fill in all fields.");
        return;
      }

      const response = await fetch("/api/events", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({
          title,
          description,
          location,
          event_date: date,
        }),
      });

      const result = await response.json();

      if (!response.ok) {
        alert(result.error || result.message || "Failed to create event");
        return;
      }

      alert(result.message || "Event created successfully");

      document.getElementById("eventTitle").value = "";
      document.getElementById("eventDescription").value = "";
      document.getElementById("eventLocation").value = "";
      document.getElementById("eventDate").value = "";

      loadEvents();
    } catch (error) {
      alert("Something went wrong while creating the event.");
    }
  }

  async function rsvpEvent(eventId) {
    try {
      const response = await fetch(`/api/events/${eventId}/rsvp`, {
        method: "POST",
      });

      const result = await response.json();

      if (!response.ok) {
        alert(result.message || result.error || "Failed to RSVP");
        loadEvents();
        return;
      }

      loadEvents();
    } catch (error) {
      alert("Something went wrong while sending your RSVP.");
    }
  }

  async function attendEvent(eventId) {
    try {
      const response = await fetch(`/api/events/${eventId}/attend`, {
        method: "POST",
      });

      const result = await response.json();

      if (!response.ok) {
        alert(result.message || result.error || "Failed to mark attending");
        loadEvents();
        return;
      }

      loadEvents();
    } catch (error) {
      alert("Something went wrong while marking attendance.");
    }
  }

  async function cancelRsvp(eventId) {
    try {
      const response = await fetch(`/api/events/${eventId}/cancel-rsvp`, {
        method: "POST",
      });

      const result = await response.json();

      if (!response.ok) {
        alert(result.message || result.error || "Failed to cancel RSVP");
        loadEvents();
        return;
      }

      loadEvents();
    } catch (error) {
      alert("Something went wrong while cancelling your RSVP.");
    }
  }

  function buildActionButtons(event) {
    if (USER_ROLE === "admin") {
      return `<span class="badge bg-secondary">Admin cannot RSVP</span>`;
    }

    if (event.user_status === "rsvp") {
      return `
        <button
          type="button"
          class="btn btn-success btn-sm me-2"
          onclick="attendEvent(${event.event_id})"
        >
          Attending
        </button>
        <button
          type="button"
          class="btn btn-danger btn-sm"
          onclick="cancelRsvp(${event.event_id})"
        >
          Cancel RSVP
        </button>
      `;
    }

    if (event.user_status === "attending") {
      return `
        <button
          type="button"
          class="btn btn-success btn-sm me-2"
          disabled
        >
          You are Attending
        </button>
        <button
          type="button"
          class="btn btn-danger btn-sm"
          onclick="cancelRsvp(${event.event_id})"
        >
          Cancel RSVP
        </button>
      `;
    }

    return `
      <button
        type="button"
        class="btn btn-primary btn-sm"
        onclick="rsvpEvent(${event.event_id})"
      >
        RSVP
      </button>
    `;
  }

  async function loadEvents() {
    try {
      const response = await fetch("/api/events");
      const events = await response.json();

      const container = document.getElementById("eventsContainer");
      container.innerHTML = "";

      if (!Array.isArray(events) || events.length === 0) {
        container.innerHTML = `
          <div class="alert alert-info">No events available.</div>
        `;
        return;
      }

      events.forEach((event) => {
        const actionButtons = buildActionButtons(event);

        container.innerHTML += `
          <div class="card shadow-sm mb-4">
            <div class="card-body">
              <h5>${event.title}</h5>
              <p>${event.description || ""}</p>
              <div class="text-muted mb-2">📍 ${event.location || ""}</div>
              <div class="text-muted mb-2">
                📅 ${event.date ? new Date(event.date).toLocaleString() : ""}
              </div>
              <div class="text-muted mb-1">
                Total RSVPs: <strong>${event.rsvp_count}</strong>
              </div>
              <div class="text-muted mb-3">
                Total Attending: <strong>${event.attending_count}</strong>
              </div>

              <div class="d-flex flex-wrap gap-2">
                ${actionButtons}
              </div>
            </div>
          </div>
        `;
      });
    } catch (error) {
      document.getElementById("eventsContainer").innerHTML = `
        <div class="alert alert-danger">Failed to load events.</div>
      `;
    }
  }

  document.addEventListener("DOMContentLoaded", function () {
    const createBtn = document.getElementById("createEventBtn");
    if (createBtn) {
      createBtn.addEventListener("click", createEvent);
    }
    loadEvents();
  });
</script>
{% endblock %}
