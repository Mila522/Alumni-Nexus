{% extends "base.html" %} {% block content %}
<div class="container py-5">
  <div class="mb-4">
    <h2 class="fw-bold">Community Pinboard</h2>
    <p class="text-muted">
      Share announcements, opportunities and updates with the alumni community.
    </p>
  </div>

  {% if current_user.is_authenticated and current_user.role == "alumni" %}
  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <h5 class="mb-3">Create Post</h5>

      <textarea
        id="postContent"
        class="form-control mb-3"
        placeholder="Share an opportunity, announcement or advice..."
      ></textarea>

      <input type="file" id="postImage" class="form-control mb-3" />

      <button class="btn btn-primary" onclick="createPost()">
        Create Post
      </button>
    </div>
  </div>
  {% endif %}

  <div id="postsContainer"></div>
</div>

<script>
  async function createPost() {
    try {
      const contentElement = document.getElementById("postContent");
      const imageInput = document.getElementById("postImage");

      if (!contentElement) {
        alert("Post content field not found");
        return;
      }

      const content = contentElement.value.trim();
      const image = imageInput ? imageInput.files[0] : null;

      if (!content) {
        alert("Post cannot be empty");
        return;
      }

      const formData = new FormData();
      formData.append("content", content);

      if (image) {
        formData.append("image", image);
      }

      const response = await fetch("/api/posts", {
        method: "POST",
        body: formData,
      });

      const text = await response.text();
      console.log("Server response:", text);

      let result;
      try {
        result = JSON.parse(text);
      } catch (e) {
        alert("Server did not return valid JSON. Check Flask route.");
        return;
      }

      if (!response.ok) {
        alert(result.error || result.message || "Failed to create post");
        return;
      }

      alert(result.message || "Post created successfully");

      contentElement.value = "";
      if (imageInput) {
        imageInput.value = "";
      }

      loadPosts();
    } catch (error) {
      console.error("Create post error:", error);
      alert("Something went wrong while creating the post.");
    }
  }

  document.getElementById("postContent").value = "";
  imageInput.value = "";
  loadPosts();

  async function toggleLike(postId) {
    const response = await fetch(`/api/posts/${postId}/like`, {
      method: "POST",
    });

    const result = await response.json();

    if (!response.ok) {
      alert(result.error || "Failed to like post");
      return;
    }

    loadPosts();
  }

  async function loadComments(postId) {
    const response = await fetch(`/api/posts/${postId}/comments`);
    const comments = await response.json();

    const container = document.getElementById(`comments-${postId}`);
    container.innerHTML = "";

    if (comments.length === 0) {
      container.innerHTML = `<p class="text-muted small">No comments yet.</p>`;
      return;
    }

    comments.forEach((comment) => {
      container.innerHTML += `
            <div class="border rounded p-2 mb-2 bg-light">
                <strong>${comment.name}</strong>
                <div>${comment.content}</div>
                <small class="text-muted">${comment.created_at}</small>
            </div>
        `;
    });
  }

  async function addComment(postId) {
    const input = document.getElementById(`comment-input-${postId}`);
    const content = input.value.trim();

    if (!content) {
      alert("Comment cannot be empty");
      return;
    }

    const response = await fetch(`/api/posts/${postId}/comment`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({ content: content }),
    });

    const result = await response.json();

    if (!response.ok) {
      alert(result.error || "Failed to add comment");
      return;
    }

    input.value = "";
    await loadComments(postId);
    loadPosts();
  }

  function sharePost(postId) {
    const postUrl = `${window.location.origin}/pinboard#post-${postId}`;

    if (navigator.share) {
      navigator
        .share({
          title: "Alumni Nexus Post",
          text: "Check out this post on Alumni Nexus",
          url: postUrl,
        })
        .catch((err) => console.log(err));
    } else {
      navigator.clipboard.writeText(postUrl);
      alert("Post link copied to clipboard");
    }
  }

  async function loadPosts() {
    try {
      const response = await fetch("/api/posts");
      const posts = await response.json();

      const container = document.getElementById("postsContainer");
      container.innerHTML = "";

      if (!Array.isArray(posts) || posts.length === 0) {
        container.innerHTML = `
                <div class="alert alert-info">
                    No updates available at the moment.
                </div>
            `;
        return;
      }

      posts.forEach((post) => {
        container.innerHTML += `
                <div class="card shadow-sm mb-4" id="post-${post.post_id}">
                    <div class="card-body">
                        <div class="d-flex align-items-center mb-3">
                            <img
                                src="/static/${post.profile_image}"
                                width="40"
                                height="40"
                                class="rounded-circle me-2"
                                style="object-fit: cover;"
                            >
                            <div>
                                <strong>${post.name}</strong>
                                <div class="text-muted small">${post.created_at}</div>
                            </div>
                        </div>

                        <p>${post.content}</p>

                        ${
                          post.image
                            ? `
                            <img
                                src="/static/${post.image}"
                                class="img-fluid rounded mt-2 mb-3"
                                alt="Post image"
                            >
                        `
                            : ""
                        }

                        <div class="d-flex flex-wrap gap-2 mb-3">
                            <button class="btn btn-sm btn-outline-primary" onclick="toggleLike(${post.post_id})">
                                ${post.liked_by_me ? "Unlike" : "Like"} (${post.like_count})
                            </button>

                            <button class="btn btn-sm btn-outline-secondary" onclick="loadComments(${post.post_id})">
                                Comments (${post.comment_count})
                            </button>
                        </div>

                        <div class="mb-3">
                            <div id="comments-${post.post_id}" class="mb-2"></div>

                            <div class="d-flex gap-2">
                                <input
                                    type="text"
                                    id="comment-input-${post.post_id}"
                                    class="form-control"
                                    placeholder="Write a comment..."
                                >
                                <button class="btn btn-sm btn-dark" onclick="addComment(${post.post_id})">
                                    Comment
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
      });
    } catch (error) {
      console.error("Error loading posts:", error);
    }
  }

  loadPosts();
</script>
{% endblock %}
