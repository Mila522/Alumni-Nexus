{% extends "base.html" %} {% block content %}
<div class="container py-5">
  <h2 class="fw-bold mb-4">Registered Alumni</h2>

  {% if alumni_users %}
  <div class="card shadow-sm">
    <div class="card-body">
      <table class="table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
          </tr>
        </thead>
        <tbody>
          {% for user in alumni_users %}
          <tr>
            <td>{{ user.name }}</td>
            <td>{{ user.email }}</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
  {% else %}
  <div class="alert alert-info">No alumni found.</div>
  {% endif %}
</div>
{% endblock %}
