{% set current_endpoint = request.endpoint %}

<style>
  .navbar {
    background-color: #042c53 !important;
    border-bottom: 2px solid #378add;
    padding: 0;
    min-height: 62px;
  }

  .navbar-brand {
    color: #ffffff !important;
    font-weight: 800;
    font-size: 1.2rem;
    letter-spacing: 0.04em;
    padding: 16px 0;
    transition: color 0.2s ease;
  }

  .navbar-brand span {
    color: #85b7eb;
  }

  .navbar-brand:hover {
    color: #85b7eb !important;
  }

  .navbar-nav .nav-link {
    color: #b5d4f4 !important;
    font-size: 0.88rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    padding: 20px 14px !important;
    position: relative;
    transition: color 0.2s ease;
  }

  .navbar-nav .nav-link::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: 14px;
    right: 14px;
    height: 2px;
    background-color: #378add;
    transform: scaleX(0);
    transition: transform 0.2s ease;
    border-radius: 2px 2px 0 0;
  }

  .navbar-nav .nav-link:hover {
    color: #ffffff !important;
  }

  .navbar-nav .nav-link:hover::after,
  .navbar-nav .nav-link.active::after {
    transform: scaleX(1);
  }

  .navbar-nav .nav-link.active {
    color: #ffffff !important;
  }

  /* Login — ghost outlined */
  .btn-outline-main {
    color: #b5d4f4 !important;
    border: 1.5px solid rgba(181, 212, 244, 0.35);
    border-radius: 6px;
    padding: 6px 18px;
    font-size: 0.85rem;
    font-weight: 500;
    background: transparent;
    text-decoration: none;
    transition:
      border-color 0.2s ease,
      color 0.2s ease,
      background 0.2s ease;
  }

  .btn-outline-main:hover {
    border-color: #378add;
    color: #ffffff !important;
    background: rgba(55, 138, 221, 0.15);
  }

  /* Register — solid blue CTA */
  .btn-main {
    background-color: #378add;
    color: #ffffff !important;
    border: 1.5px solid #378add;
    border-radius: 6px;
    padding: 6px 18px;
    font-size: 0.85rem;
    font-weight: 700;
    text-decoration: none;
    transition:
      background 0.2s ease,
      border-color 0.2s ease;
  }

  .btn-main:hover {
    background-color: #185fa5;
    border-color: #185fa5;
  }

  /* Mobile toggler */
  .navbar-toggler {
    border-color: rgba(55, 138, 221, 0.5) !important;
    padding: 4px 8px;
  }

  .navbar-toggler-icon {
    background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba(181,212,244,1)' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e") !important;
  }

  /* Dropdown */
  .navbar .dropdown-menu {
    background-color: #0c447c;
    border: 1px solid #185fa5;
    border-top: 2px solid #378add;
    border-radius: 0 0 8px 8px;
    margin-top: 0;
    box-shadow: 0 8px 24px rgba(4, 44, 83, 0.4);
  }

  .navbar .dropdown-item {
    color: #b5d4f4;
    font-size: 0.88rem;
    padding: 8px 20px;
    transition:
      background 0.15s ease,
      color 0.15s ease;
  }

  .navbar .dropdown-item:hover {
    background-color: rgba(55, 138, 221, 0.15);
    color: #ffffff;
  }
</style>

<nav class="navbar navbar-expand-lg sticky-top shadow-sm">
  <div class="container">
    <a class="navbar-brand" href="{{ url_for('home') }}">
      Alumni <span>Nexus</span>
    </a>

    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#mainNavbar"
      aria-controls="mainNavbar"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="mainNavbar">
      <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a
            class="nav-link {% if current_endpoint == 'mynetwork' %}active{% endif %}"
            href="{{ url_for('mynetwork') }}"
            >MyNetwork</a
          >
        </li>
        <li class="nav-item">
          <a
            class="nav-link {% if current_endpoint == 'pinboard' %}active{% endif %}"
            href="{{ url_for('pinboard') }}"
            >Pinboard</a
          >
        </li>
        <li class="nav-item">
          <a
            class="nav-link {% if current_endpoint == 'mentorship' %}active{% endif %}"
            href="{{ url_for('mentorship') }}"
            >Mentorship</a
          >
        </li>
        <li class="nav-item">
          {% if current_user.is_authenticated %}
          <a
            class="nav-link {% if current_endpoint == 'profile' %}active{% endif %}"
            href="{{ url_for('profile', user_id=current_user.user_id) }}"
            >MyProfile</a
          >
          {% else %}
          <a class="nav-link" href="{{ url_for('login') }}">MyProfile</a>
          {% endif %}
        </li>
      </ul>

      <div class="d-flex gap-2">
        {% if current_user.is_authenticated %}
        <a
          href="{{ url_for('profile', user_id=current_user.user_id) }}"
          class="btn btn-outline-main"
          >Profile</a
        >
        <a href="{{ url_for('logout') }}" class="btn btn-main">Logout</a>
        {% else %}
        <a href="{{ url_for('login') }}" class="btn btn-outline-main">Login</a>
        <a href="{{ url_for('register') }}" class="btn btn-main">Register</a>
        {% endif %}
      </div>
    </div>
  </div>
</nav>
